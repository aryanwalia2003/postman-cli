name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Binary
        run: |
          go build -o reqx.exe main.go

      - name: Package Release
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Path dist
          Copy-Item reqx.exe -Destination dist/
          Copy-Item install.ps1 -Destination dist/
          7z a reqx-windows.zip ./dist/*

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: reqx-windows.zip
          body: |
            ## 🚀 ReqX Release ${{ github.ref_name }}
            
            Welcome to the latest version of **ReqX**.
            
            ### Installation (Windows)
            1. Download `reqx-windows.zip`.
            2. Extract and run `install.ps1` in PowerShell as Administrator.
            3. Restart your terminal.
            
            ### One-Liner Install
            ```powershell
            iwr -useb https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
