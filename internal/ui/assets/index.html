<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReqX · History</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a;
      --border:#2a2d3e; --text:#e2e8f0; --muted:#64748b;
      --accent:#6366f1; --green:#22c55e; --red:#ef4444; --yellow:#f59e0b;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Inter','Segoe UI',sans-serif; min-height:100vh; }
    header { padding:20px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    header h1 { font-size:1.2rem; font-weight:600; letter-spacing:-0.02em; }
    header span { color:var(--accent); font-weight:700; }
    .badge { background:var(--accent); color:#fff; font-size:0.65rem; padding:2px 8px; border-radius:99px; font-weight:600; }
    main { padding:32px; max-width:1280px; margin:0 auto; display:grid; gap:28px; }
    .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; }
    .card-title { font-size:0.8rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:16px; }
    canvas { max-height:260px; }
    table { width:100%; border-collapse:collapse; font-size:0.85rem; }
    thead th { padding:8px 12px; text-align:left; color:var(--muted); font-weight:500; border-bottom:1px solid var(--border); }
    tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
    tbody tr:hover { background:rgba(99,102,241,0.06); }
    td { padding:10px 12px; }
    td.mono { font-family:monospace; font-size:0.82rem; color:var(--muted); }
    .pill { display:inline-block; padding:2px 8px; border-radius:99px; font-size:0.72rem; font-weight:600; }
    .pill-green { background:rgba(34,197,94,0.12);  color:var(--green); }
    .pill-red   { background:rgba(239,68,68,0.12);  color:var(--red);   }
    .pill-yellow{ background:rgba(245,158,11,0.12); color:var(--yellow);}
    .empty { text-align:center; color:var(--muted); padding:48px; font-size:0.9rem; }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px 20px; }
    .stat-label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; }
    .stat-value { font-size:1.6rem; font-weight:700; margin-top:6px; letter-spacing:-0.03em; }
    /* detail panel */
    .detail-row td { padding:0; background:rgba(0,0,0,0.18); }
    .tab-bar { display:flex; border-bottom:1px solid var(--border); padding:0 16px; }
    .tab-btn { background:none; border:none; border-bottom:2px solid transparent;
               color:var(--muted); font-size:0.78rem; padding:10px 14px;
               cursor:pointer; transition:color .15s,border-color .15s; }
    .tab-btn.active { color:var(--text); border-bottom-color:var(--accent); }
    .tab-content { padding:16px 24px; }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
    .req-row { display:flex; justify-content:space-between; padding:8px 0;
               border-bottom:1px solid var(--border); font-size:0.8rem; }
    .req-row:last-child { border-bottom:none; }
    /* dag */
    .dag-wrap { overflow:auto; background:#0d1017; border-radius:8px; padding:16px; }
    .dag-legend { display:flex; gap:16px; flex-wrap:wrap; margin-top:10px;
                  font-size:0.75rem; color:var(--muted); }
    .dag-legend span { display:flex; align-items:center; gap:5px; }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  </style>
</head>
<body>
<header>
  <h1><span>ReqX</span> · Test History</h1>
  <div class="badge">Local</div>
</header>
<main>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="chart-card">
    <div class="card-title">P95 Latency Trend (ms)</div>
    <canvas id="chart"></canvas>
  </div>
  <div class="chart-card">
    <div class="card-title">Recent Runs</div>
    <div id="table-container"><div class="empty">Loading…</div></div>
  </div>
</main>
<script>
const NODE_W=148, NODE_H=46, LEVEL_GAP=100, NODE_GAP=18, PAD=40;
const STATUS_COLOR={success:'#22c55e',failed:'#ef4444',skipped:'#475569',unknown:'#a78bfa'};

async function load() {
  const runs = await fetch('/api/history').then(r=>r.json());
  if (!runs || !runs.length) {
    document.getElementById('table-container').innerHTML='<div class="empty">No test runs. Run <code>reqx run …</code> to start.</div>';
    return;
  }
  const latest=runs[0];
  document.getElementById('stats-grid').innerHTML=[
    {label:'Last P95',   value:latest.p95_ms+' ms'},
    {label:'Last RPS',   value:latest.rps.toFixed(1)},
    {label:'Error Rate', value:latest.error_pct.toFixed(1)+'%'},
    {label:'Total Runs', value:runs.length},
  ].map(c=>`<div class="stat-card"><div class="stat-label">${c.label}</div><div class="stat-value">${c.value}</div></div>`).join('');

  new Chart(document.getElementById('chart'),{
    type:'line',
    data:{labels:runs.map(r=>r.ts.slice(0,16)).reverse(),
          datasets:[{label:'P95 (ms)',data:runs.map(r=>r.p95_ms).reverse(),
            borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,0.08)',
            borderWidth:2,pointRadius:4,pointBackgroundColor:'#6366f1',tension:0.35,fill:true}]},
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#64748b',maxTicksLimit:8},grid:{color:'#2a2d3e'}},
              y:{ticks:{color:'#64748b'},grid:{color:'#2a2d3e'}}}}
  });

  document.getElementById('table-container').innerHTML=`
    <table><thead><tr><th>Time</th><th>Collection</th><th>Requests</th><th>RPS</th><th>P95</th><th>Errors</th></tr></thead>
    <tbody>${runs.map(r=>{
      const ec=r.error_pct>5?'pill-red':r.error_pct>0?'pill-yellow':'pill-green';
      return `<tr style="cursor:pointer" onclick="toggleDetail('${r.id}',this)">
        <td class="mono">${r.ts.slice(0,19).replace('T',' ')}</td>
        <td>${r.collection}</td><td>${r.total_reqs}</td>
        <td>${r.rps.toFixed(1)}</td><td>${r.p95_ms} ms</td>
        <td><span class="pill ${ec}">${r.error_pct.toFixed(1)}%</span></td></tr>`;
    }).join('')}</tbody></table>`;
}

async function toggleDetail(id,tr) {
  const ex=tr.nextElementSibling;
  if (ex && ex.classList.contains('dr')) { ex.remove(); return; }
  document.querySelectorAll('.dr').forEach(e=>e.remove());

  const [stats, dag] = await Promise.all([
    fetch(`/api/history/${id}`).then(r=>r.json()),
    fetch(`/api/history/${id}/dag`).then(r=>r.json()),
  ]);
  const hasDAG = dag && dag.length > 0;

  const statsHtml = (stats||[]).map(s=>`
    <div class="req-row">
      <div style="flex:2.5;font-weight:500">${s.name}</div>
      <div style="flex:1;color:var(--green)">${s.successes} pass</div>
      <div style="flex:1;color:var(--red)">${s.failures} fail</div>
      <div style="flex:1">P95: ${s.p95_ms}ms</div>
      <div style="flex:1">Avg: ${s.avg_ms}ms</div>
    </div>`).join('') || '<div class="empty" style="padding:24px">No per-request data.</div>';

  const newTr=document.createElement('tr');
  newTr.className='dr';
  newTr.innerHTML=`<td colspan="6">
    ${hasDAG?`<div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab(this,'s-${id}')">Stats</button>
      <button class="tab-btn"        onclick="switchTab(this,'g-${id}')">Graph</button>
    </div>`:''}
    <div class="tab-content">
      <div id="s-${id}" class="tab-pane active">${statsHtml}</div>
      ${hasDAG?`<div id="g-${id}" class="tab-pane">
        <div class="dag-wrap"><canvas id="c-${id}"></canvas></div>
        <div class="dag-legend">
          <span><span class="dot" style="background:#22c55e"></span>success</span>
          <span><span class="dot" style="background:#ef4444"></span>failed</span>
          <span><span class="dot" style="background:#475569"></span>skipped</span>
          <span><span class="dot" style="background:#a78bfa"></span>unknown</span>
        </div>
      </div>`:''}
    </div>
  </td>`;
  tr.parentNode.insertBefore(newTr, tr.nextSibling);
  if (hasDAG) renderDAG(`c-${id}`, dag);
}

function switchTab(btn,tid) {
  const bar=btn.closest('.tab-bar'), tc=btn.closest('td');
  bar.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  tc.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tid).classList.add('active');
}

function renderDAG(canvasId, nodes) {
  const cv=document.getElementById(canvasId);
  if (!cv) return;

  // Group by level
  const byLevel={};
  nodes.forEach(n=>{ (byLevel[n.level_idx]||(byLevel[n.level_idx]=[])).push(n); });
  const maxLvl=Math.max(...Object.keys(byLevel).map(Number));
  const maxCols=Math.max(...Object.values(byLevel).map(a=>a.length));

  const W=Math.max(520, maxCols*(NODE_W+NODE_GAP)+PAD*2);
  const H=(maxLvl+1)*(NODE_H+LEVEL_GAP)+PAD*2;
  cv.width=W; cv.height=H;

  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);

  // Compute positions
  const pos={};
  Object.keys(byLevel).forEach(lvl=>{
    const grp=byLevel[lvl];
    const totalW=grp.length*NODE_W+(grp.length-1)*NODE_GAP;
    const x0=(W-totalW)/2;
    const y=PAD+Number(lvl)*(NODE_H+LEVEL_GAP);
    grp.forEach((n,i)=>{
      const x=x0+i*(NODE_W+NODE_GAP);
      pos[n.name]={x,y,cx:x+NODE_W/2,cy:y+NODE_H/2};
    });
  });

  // Draw edges
  nodes.forEach(n=>{
    let deps=[];
    try{deps=JSON.parse(n.depends_on||'[]');}catch(_){}
    deps.forEach(dep=>{
      const f=pos[dep], t=pos[n.name];
      if(!f||!t) return;
      const dy=t.y-f.y-NODE_H;
      ctx.beginPath();
      ctx.moveTo(f.cx, f.y+NODE_H);
      ctx.bezierCurveTo(f.cx, f.y+NODE_H+dy*0.45, t.cx, t.y-dy*0.45, t.cx, t.y);
      ctx.strokeStyle='#2a3a5a'; ctx.lineWidth=1.5; ctx.stroke();
      // arrowhead
      ctx.beginPath();
      ctx.moveTo(t.cx,t.y);
      ctx.lineTo(t.cx-5,t.y-9);
      ctx.lineTo(t.cx+5,t.y-9);
      ctx.closePath(); ctx.fillStyle='#2a3a5a'; ctx.fill();
    });
  });

  // Draw nodes
  nodes.forEach(n=>{
    const p=pos[n.name]; if(!p) return;
    const col=STATUS_COLOR[n.status]||STATUS_COLOR.unknown;
    const r2h=hexAlpha(col,0.15), r2s=col;

    ctx.beginPath();
    rrect(ctx,p.x,p.y,NODE_W,NODE_H,6);
    ctx.fillStyle=r2h; ctx.fill();
    ctx.strokeStyle=r2s; ctx.lineWidth=1.5; ctx.stroke();

    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#e2e8f0'; ctx.font='bold 11px Inter,sans-serif';
    ctx.fillText(trunc(n.name,17), p.cx, p.cy-7);

    ctx.fillStyle=col; ctx.font='10px Inter,sans-serif';
    const sub=n.status==='skipped'?'skipped':n.status==='failed'?'failed':
               n.duration_ms>0?n.duration_ms+'ms':n.status;
    ctx.fillText(sub, p.cx, p.cy+8);
  });
}

function rrect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function hexAlpha(hex,a){
  const rv=parseInt(hex.slice(1,3),16),gv=parseInt(hex.slice(3,5),16),bv=parseInt(hex.slice(5,7),16);
  return `rgba(${rv},${gv},${bv},${a})`;
}
function trunc(s,n){return s.length<=n?s:s.slice(0,n-1)+'…';}

load().catch(e=>console.error(e));
</script>
</body>
</html>
